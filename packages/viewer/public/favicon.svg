<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef9ef"/>
      <stop offset="100%" stop-color="#f5e6c8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8833a"/>
      <stop offset="100%" stop-color="#c9562b"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <rect x="14" y="10" width="38" height="48" rx="2" fill="#c4a882" opacity="0.4"/>
  <!-- Back page -->
  <rect x="11" y="6" width="38" height="48" rx="2" fill="url(#page)" stroke="#d4b896" stroke-width="1.2"/>
  <!-- Front page, slightly rotated for depth -->
  <rect x="15" y="4" width="38" height="48" rx="2" fill="url(#page)" stroke="#d4b896" stroke-width="1.2" transform="rotate(-3 34 28)"/>
  <!-- Folded corner -->
  <path d="M49.5 4 L49.5 14 L53 4 Z" fill="#efe0c9" stroke="#d4b896" stroke-width="0.8" transform="rotate(-3 34 28)"/>
  <!-- Text lines on the page -->
  <g transform="rotate(-3 34 28)" opacity="0.45">
    <rect x="21" y="14" width="26" height="2" rx="1" fill="#8b7355"/>
    <rect x="21" y="20" width="22" height="2" rx="1" fill="#8b7355"/>
    <rect x="21" y="26" width="25" height="2" rx="1" fill="#8b7355"/>
    <rect x="21" y="32" width="18" height="2" rx="1" fill="#8b7355"/>
    <rect x="21" y="38" width="23" height="2" rx="1" fill="#8b7355"/>
  </g>
  <!-- Sparkle / story magic accent -->
  <circle cx="48" cy="48" r="9" fill="url(#accent)" opacity="0.9"/>
  <text x="48" y="53" text-anchor="middle" font-size="14" font-family="serif" font-weight="bold" fill="white">S</text>
  <!-- Small sparkles -->
  <g fill="#e8833a" opacity="0.7">
    <circle cx="42" cy="55" r="1.5"/>
    <circle cx="54" cy="42" r="1"/>
    <circle cx="39" cy="44" r="1"/>
  </g>
</svg>
